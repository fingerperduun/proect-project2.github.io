<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Верстай ярко!</title>
    <style>
        /* Базовые стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        header {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links {
            display: flex;
            list-style: none;
        }
        
        .nav-links li {
            margin-left: 30px;
        }
        
        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }
        
        /* Герой секция */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            text-align: center;
            padding-top: 80px;
        }
        
        .hero-content h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .hero-content p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            color: #333;
            padding: 15px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            border: none;
        }
        
        /* Секция игры */
        .game-section {
            padding: 100px 0;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 60px;
            background: linear-gradient(45deg, #a1c4fd, #c2e9fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        
        .game-area {
            position: relative;
            height: 400px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .falling-tag {
            position: absolute;
            padding: 10px 15px;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            border-radius: 5px;
            font-weight: bold;
            color: #333;
            user-select: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .basket {
            position: absolute;
            bottom: 10px;
            width: 120px;
            height: 60px;
            background: linear-gradient(45deg, #a1c4fd, #c2e9fb);
            border-radius: 10px 10px 0 0;
            transition: left 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #333;
        }
        
        .controls {
            text-align: center;
            margin-top: 20px;
        }
        
        .message {
            text-align: center;
            font-size: 1.2rem;
            margin-top: 20px;
            min-height: 30px;
        }
        
        /* Футер */
        footer {
            background: rgba(0, 0, 0, 0.3);
            padding: 40px 0;
            text-align: center;
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .hero-content h1 {
                font-size: 2.5rem;
            }
            
            .hero-content p {
                font-size: 1.2rem;
            }
            
            .game-area {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- Шапка -->
    <header>
        <div class="container">
            <nav>
                <div class="logo">vErstka</div>
                <ul class="nav-links">
                    <li><a href="#home">Главная</a></li>
                    <li><a href="#game">Игра</a></li>
                    <li><a href="#contact">Контакты</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Герой секция -->
    <section class="hero" id="home">
        <div class="container">
            <div class="hero-content">
                <a href="#game" class="btn">Поиграть в игру</a>
            </div>
        </div>
    </section>

    <!-- Секция игры -->
    <section class="game-section" id="game">
        <div class="container">
            <h2 class="section-title">Поймай HTML-тег!</h2>
            <div class="game-container">
                <div class="game-info">
                    <div class="score">Счет: <span id="score">0</span></div>
                    <div class="timer">Время: <span id="timer">60</span>с</div>
                </div>
                <div class="game-area" id="gameArea">
                    <div class="basket" id="basket">Корзина</div>
                </div>
                <div class="message" id="message">Поймайте как можно больше HTML-тегов за 60 секунд!</div>
                <div class="controls">
                    <button class="btn" id="startBtn">Начать игру</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Футер -->
    <footer id="contact">
        <div class="container">
            <h2>Свяжитесь со мной</h2>
            <p>Пацук Владислав номер: 89655777961</p>
        </div>
    </footer>

    <script>
        // Элементы игры
        const gameArea = document.getElementById('gameArea');
        const basket = document.getElementById('basket');
        const scoreElement = document.getElementById('score');
        const timerElement = document.getElementById('timer');
        const messageElement = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        
        // Переменные игры
        let score = 0;
        let timer = 60;
        let gameInterval;
        let tagInterval;
        let isGameActive = false;
        let fallingTags = [];
        
        // HTML-теги для игры
        const htmlTags = ['<div>', '<p>', '<span>', '<h1>', '<a>', '<img>', '<ul>', '<li>', '<header>', '<footer>'];
        
        // Управление корзиной
        document.addEventListener('mousemove', (e) => {
            if (!isGameActive) return;
            
            const gameAreaRect = gameArea.getBoundingClientRect();
            const basketWidth = basket.offsetWidth;
            let newPosition = e.clientX - gameAreaRect.left - basketWidth / 2;
            
            // Ограничение движения в пределах игровой области
            if (newPosition < 0) newPosition = 0;
            if (newPosition > gameArea.offsetWidth - basketWidth) newPosition = gameArea.offsetWidth - basketWidth;
            
            basket.style.left = `${newPosition}px`;
        });
        
        // Создание падающего тега
        function createFallingTag() {
            if (!isGameActive) return;
            
            const tag = document.createElement('div');
            tag.className = 'falling-tag';
            tag.textContent = htmlTags[Math.floor(Math.random() * htmlTags.length)];
            
            // Случайная позиция вверху игровой области
            const maxLeft = gameArea.offsetWidth - 80;
            const leftPosition = Math.floor(Math.random() * maxLeft);
            tag.style.left = `${leftPosition}px`;
            tag.style.top = '0px';
            
            gameArea.appendChild(tag);
            fallingTags.push({
                element: tag,
                left: leftPosition,
                top: 0,
                speed: 2 + Math.random() * 2
            });
        }
        
        // Обновление позиции тегов
        function updateTags() {
            if (!isGameActive) return;
            
            const basketRect = basket.getBoundingClientRect();
            const gameAreaRect = gameArea.getBoundingClientRect();
            
            for (let i = fallingTags.length - 1; i >= 0; i--) {
                const tag = fallingTags[i];
                tag.top += tag.speed;
                tag.element.style.top = `${tag.top}px`;
                
                // Проверка столкновения с корзиной
                const tagRect = {
                    left: tag.left,
                    top: tag.top,
                    right: tag.left + 60,
                    bottom: tag.top + 30
                };
                
                const basketRectAdjusted = {
                    left: parseInt(basket.style.left) || 0,
                    top: gameArea.offsetHeight - 70,
                    right: (parseInt(basket.style.left) || 0) + 120,
                    bottom: gameArea.offsetHeight
                };
                
                if (tagRect.bottom >= basketRectAdjusted.top &&
                    tagRect.left >= basketRectAdjusted.left - 20 &&
                    tagRect.right <= basketRectAdjusted.right + 20) {
                    // Тег пойман
                    score += 10;
                    scoreElement.textContent = score;
                    tag.element.remove();
                    fallingTags.splice(i, 1);
                    messageElement.textContent = 'Отлично! +10 очков';
                    continue;
                }
                
                // Если тег упал ниже корзины
                if (tag.top > gameArea.offsetHeight) {
                    tag.element.remove();
                    fallingTags.splice(i, 1);
                }
            }
        }
        
        // Начало игры
        startBtn.addEventListener('click', () => {
            if (isGameActive) return;
            
            // Сброс игры
            score = 0;
            timer = 60;
            scoreElement.textContent = score;
            timerElement.textContent = timer;
            messageElement.textContent = 'Ловите HTML-теги!';
            
            // Очистка игровой области
            fallingTags.forEach(tag => tag.element.remove());
            fallingTags = [];
            
            // Запуск игры
            isGameActive = true;
            startBtn.disabled = true;
            startBtn.textContent = 'Игра идет...';
            
            // Таймер игры
            gameInterval = setInterval(() => {
                timer--;
                timerElement.textContent = timer;
                
                if (timer <= 0) {
                    endGame();
                }
            }, 1000);
            
            // Создание тегов
            tagInterval = setInterval(createFallingTag, 1000);
            
            // Игровой цикл
            const gameLoop = setInterval(() => {
                if (!isGameActive) {
                    clearInterval(gameLoop);
                    return;
                }
                updateTags();
            }, 50);
        });
        
        // Завершение игры
        function endGame() {
            isGameActive = false;
            clearInterval(gameInterval);
            clearInterval(tagInterval);
            
            startBtn.disabled = false;
            startBtn.textContent = 'Играть снова';
            
            // Очистка тегов
            fallingTags.forEach(tag => tag.element.remove());
            fallingTags = [];
            
            // Сообщение о результате
            let message = `Игра окончена! Ваш счет: ${score} `;
            if (score >= 200) {
                message += 'Отличный результат! Вы мастер верстки!';
            } else if (score >= 100) {
                message += 'Хороший результат! Продолжайте в том же духе!';
            } else {
                message += 'Попробуйте еще раз, чтобы улучшить результат!';
            }
            
            messageElement.textContent = message;
        }
    </script>
</body>
</html>
